            { id: 'frm-18', name: 'Admin เว็บไซต์อินเทอร์เน็ต', url: 'https://www.nacc.go.th/user/login' },
            { id: 'frm-19', name: 'Smart-eVision', url: 'https://acic.nacc.go.th/nacc/' },
            { id: 'frm-20', name: 'ระบบฐานข้อมูลยานพาหนะ สำนักงาน ป.ป.ช.', url: 'https://cf.nacc.go.th/car_license2' },

            { id: 'frm-28', name: 'ระบบบริหารจัดการทรัพย์สิน (AMS)', url: 'https://ams.nacc.go.th/portallogin' },
            { id: 'frm-29', name: 'ระบบการจัดทำต้นทุนผลผลิต', url: 'https://ucs.nacc.go.th/portallogin' },
            { id: 'frm-30', name: 'Smart NACC Web', url: 'https://smart.nacc.go.th/login' },
            { id: 'frm-31', name: 'Smart NACC Mobile', url: 'https://smart.nacc.go.th/qrcode' },
            { id: 'frm-32', name: 'ระบบเปิดเผยผลการตรวจสอบทรัพย์สินและหนี้สิน', url: 'https://asset_reveal.nacc.go.th/' },
            { id: 'frm-33', name: 'ระบบบริหารจัดการภารกิจภายในสำนักกฎหมาย', url: 'https://tms.nacc.go.th/login' },
            { id: 'frm-34', name: 'ระบบขอใช้รถส่วนกลาง', url: 'https://vdwss.nacc.go.th/portallogin' },
            { id: 'frm-35', name: 'ระบบรายงานการติดตาม และประเมินผลมาตรการฯ (RMES)', url: 'https://rmes.nacc.go.th/portallogin' },
            { id: 'frm-36', name: 'ระบบขยายระยะเวลาตรวจสอบทรัพย์สิน', url: 'https://etcasset.nacc.go.th/checklogin' },
            { id: 'frm-37', name: 'CDS', url: 'https://cds.nacc.go.th/portallogin' },
            { id: 'frm-38', name: 'ระบบจองห้องประชุม', url: 'https://meetingroom.nacc.go.th/checkLoginPortal' },
            { id: 'frm-39', name: 'ระบบบันทึกเรื่องไต่สวนที่ไม่มีมูล', url: 'https://incul.nacc.go.th/incul_admin/' },
            { id: 'frm-40', name: 'ติดตามการก่อสร้าง (CTS)', url: 'https://cts.nacc.go.th/actionlogin?portal=1' },
            { id: 'frm-41', name: 'PSI : ระบบส่งผลงาน', url: 'https://psi.nacc.go.th/portallogin' },
            { id: 'frm-42', name: 'PSG : ระบบส่งผลงาน (ตำแหน่งทั่วไป)', url: 'https://psg.nacc.go.th/portallogin' },
            { id: 'frm-43', name: 'MREP', url: 'https://mrep.nacc.go.th/login?portal=1' },
            { id: 'frm-44', name: 'ระบบสืบค้นมติคณะกรรมการ ป.ป.ช. และคำพิพากษา', url: 'https://rrs.nacc.go.th/login?portal=1' },
            { id: 'frm-45', name: 'SQS', url: 'https://externalws.nacc.go.th:5000/' },
            { id: 'frm-46', name: 'ACASN: จัดชุดออกเลขแดง', url: 'https://acasn.nacc.go.th/checklogin' },
            { id: 'frm-47', name: 'ระบบบริหารจัดการผู้แจ้งเบาะแส', url: 'https://wms.nacc.go.th/portal' },
            { id: 'frm-48', name: 'ระบบรายงานผลตรวจรับพัสดุ', url: 'https://sers.nacc.go.th/checkLoginPortal' },
            { id: 'frm-49', name: 'ระบบรายงานมาตรการประหยัดพลังงาน', url: 'https://esis.nacc.go.th' },
            { id: 'frm-50', name: 'ระบบเบิกจ่ายค่าเช่าบ้าน : DORH', url: 'https://dorh.nacc.go.th/checkLoginPortal' },
            { id: 'frm-51', name: 'ระบบ ECM และ KDS', url: 'https://ecm.nacc.go.th/portal' },
            { id: 'frm-52', name: 'APS: ระบบบันทึกการนัดหมาย', url: 'https://aps.nacc.go.th/' },
            { id: 'frm-53', name: 'ระบบ ODRS', url: 'https://odrs.nacc.go.th/login?portal=1' },
            { id: 'frm-54', name: 'ระบบบริหารจัดการวัสดุภายในสำนัก (SMS)', url: 'https://itstock.nacc.go.th/login' },
            { id: 'frm-55', name: 'ระบบบริหารงานพัสดุไปรษณีย์ (PMS)', url: 'https://pms.nacc.go.th/login?portal=1' },
            { id: 'frm-56', name: 'ระบบสมุดตรวจราชการ (CSIB)', url: 'https://csib.nacc.go.th' },
            { id: 'frm-57', name: 'ระบบถาม - ตอบ (Q & A System)', url: 'https://qamng.nacc.go.th/' },
            { id: 'frm-58', name: 'HRDIS2 (ส่วน IDP)', url: 'https://hrdis2.nacc.go.th/' },
            { id: 'frm-59', name: 'ระบบจองห้องประชุม Webex', url: 'https://webexbooking.nacc.go.th/NaccWebex/login.xhtml' },
            { id: 'frm-60', name: 'Social Credit', url: 'https://social-credit.nacc.go.th/portal' },
            { id: 'frm-61', name: 'NACC Maps', url: 'https://gis.nacc.go.th/portal/apps/experiencebuilder/experience/?csrt=17684589547006525433&id=6cf13712ef884e1bbafd3ebb48bc32b8' },
            { id: 'frm-62', name: 'Tool Support System', url: 'https://tool.nacc.go.th' },
            { id: 'frm-63', name: 'ICCMS', url: 'https://iccms.nacc.go.th/portal' }
        ];

        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [links, setLinks] = useState(rawLinks.map(link => ({ ...link, status: 'idle', data: null })));
            const [isChecking, setIsChecking] = useState(false);
            const [progress, setProgress] = useState(0);
            const [searchTerm, setSearchTerm] = useState('');
            const [showReport, setShowReport] = useState(false);
            const [copySuccess, setCopySuccess] = useState(false);
            const abortControllerRef = useRef(null);

            const getThaiDate = () => {
                const date = new Date();
                const months = [
                    "มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน",
                    "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"
                ];
                return `${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear() + 543}`;
            };

            const analyzeStatus = (status, timeTaken) => {
                let badge = 'bg-gray-100 text-gray-800';
                let icon = 'fa-circle-question';
                let text = 'Unknown';
                let detail = '';

                if (status === 'reachable') {
                    badge = 'bg-green-100 text-green-800 border-green-200';
                    icon = 'fa-globe text-green-500';
                    text = 'เปิดได้ปกติ';
                    detail = '✅ หน้าต่างระบบโหลดสำเร็จ (เครือข่ายเข้าถึงได้)';
                } else {
                    badge = 'bg-red-100 text-red-800 border-red-200';
                    icon = 'fa-triangle-exclamation text-red-500';
                    text = 'เปิดไม่ได้ / Error';
                    detail = '❌ โหลดหน้าเว็บไม่สำเร็จ (เซิร์ฟเวอร์ตาย หรือเครือข่ายล่ม)';
                }

                if (timeTaken > 10000 && status === 'reachable') {
                     detail += ' (⚠️ ใช้เวลาโหลดนานมาก)';
                }

                return { badge, icon, text, detail };
            };

            const checkSingleLink = async (url, globalSignal) => {
                const startTime = Date.now();
                // จับเวลา Timeout สูงสุด 15 วินาทีต่อ 1 ลิ้งก์
                const localController = new AbortController();
                const timeoutId = setTimeout(() => localController.abort(), 15000);
                
                const abortHandler = () => localController.abort();
                globalSignal.addEventListener('abort', abortHandler);

                try {
                    // ดึงข้อมูลตรงจาก Browser (ไม่เจาะผ่าน Proxy) 
                    // mode: 'no-cors' จะแค่จำลองเช็คว่าเปิดลิ้งก์ได้ปกติหรือไม่เท่านั้น
                    await fetch(url, { 
                        mode: 'no-cors', 
                        cache: 'no-store', 
                        signal: localController.signal 
                    });
                    
                    clearTimeout(timeoutId);
                    globalSignal.removeEventListener('abort', abortHandler);
                    return { status: 'reachable', time: Date.now() - startTime };
                } catch (error) {
                    clearTimeout(timeoutId);
                    globalSignal.removeEventListener('abort', abortHandler);
                    if (globalSignal.aborted) return null;
                    return { status: 'unreachable', time: Date.now() - startTime };
                }
            };

            const handleCheckAll = async () => {
                if (isChecking) {
                    if (abortControllerRef.current) {
                        abortControllerRef.current.abort();
                    }
                    setIsChecking(false);
                    return;
                }

                setIsChecking(true);
                setProgress(0);
                setLinks(prev => prev.map(l => ({ ...l, status: 'pending', data: null, rawStatus: null, time: null })));
                
                abortControllerRef.current = new AbortController();
                const signal = abortControllerRef.current.signal;

                let completed = 0;
                
                const batchSize = 5;
                for (let i = 0; i < links.length; i += batchSize) {
                    if (signal.aborted) break;
                    
                    const batch = links.slice(i, i + batchSize);
                    const promises = batch.map(async (link, index) => {
                        const actualIndex = i + index;
                        
                        setLinks(prev => {
                            const next = [...prev];
                            next[actualIndex].status = 'checking';
                            return next;
                        });

                        const result = await checkSingleLink(link.url, signal);
                        
                        if (result) {
                            setLinks(prev => {
                                const next = [...prev];
                                next[actualIndex] = {
                                    ...next[actualIndex],
                                    status: 'done',
                                    data: analyzeStatus(result.status, result.time),
                                    rawStatus: result.status,
                                    time: result.time
                                };
                                return next;
                            });
                        }
                        
                        completed++;
                        setProgress(Math.round((completed / links.length) * 100));
                    });

                    await Promise.all(promises);
                }
                
                setIsChecking(false);
            };

            const filteredLinks = links.filter(l => 
                l.name.toLowerCase().includes(searchTerm.toLowerCase()) || 
                l.url.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const stats = {
                total: links.length,
                online: links.filter(l => l.rawStatus === 'reachable').length,
                error: links.filter(l => l.rawStatus === 'unreachable').length,
            };

            const generateReportText = () => {
                const dateStr = getThaiDate();
                let statusText = "";
                
                // ตรวจสอบว่าเช็คครบหรือยัง และสรุปผล
                if (stats.online === stats.total) {
                    statusText = "- ระบบที่สามารถใช้งานได้ : ใช้งานได้ทุกระบบ";
                } else {
                    statusText = `- ระบบที่สามารถใช้งานได้ : ใช้งานได้ ${stats.online} ระบบ และพบความผิดปกติ ${stats.error} ระบบ`;
                }

                return `รายงานสถานการณ์การทำงานของระบบสารสนเทศสำนักงาน ป.ป.ช.\nวันที่ ${dateStr}\nตรวจสอบระบบสารสนเทศจำนวน ${stats.total} ระบบ\n${statusText}\n\n__________________________\nผู้รายงาน : นางสาวอธิศ์ฐาณณ์  ศรีสวัสดิ์\nวันที่ ${dateStr}`;
            };

            const handleCopy = () => {
                const textarea = document.getElementById('report-text');
                textarea.select();
                document.execCommand('copy');
                setCopySuccess(true);
                setTimeout(() => setCopySuccess(false), 2000);
            };

            return (
                <div className="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
                    {/* Header Section */}
                    <div className="bg-white rounded-xl shadow-sm p-6 mb-6 border border-gray-100">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                    <i className="fa-solid fa-bolt text-blue-600"></i>
                                    NACC Link Access Checker
                                </h1>
                                <p className="text-gray-500 mt-1 text-sm">
                                    ระบบตรวจสอบสถานะการเปิดลิ้งก์แอปพลิเคชัน 64 ระบบ (ยิงตรงจากเครือข่ายผู้ใช้ ไม่ผ่าน Proxy)
                                </p>
                            </div>
                            <div className="flex gap-3">
                                <button 
                                    onClick={() => setShowReport(true)}
                                    className="px-6 py-2.5 rounded-lg font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 border border-gray-300 shadow-sm transition-all flex items-center gap-2"
                                >
                                    <i className="fa-solid fa-file-lines text-green-600"></i> พิมพ์รายงาน
                                </button>
                                <button 
                                    onClick={handleCheckAll}
                                    className={`px-6 py-2.5 rounded-lg font-medium text-white shadow-sm transition-all flex items-center gap-2 ${
                                        isChecking ? 'bg-red-500 hover:bg-red-600' : 'bg-blue-600 hover:bg-blue-700'
                                    }`}
                                >
                                    {isChecking ? (
                                        <><i className="fa-solid fa-stop"></i> หยุดตรวจสอบ</>
                                    ) : (
                                        <><i className="fa-solid fa-play"></i> ตรวจสอบการเปิดหน้าเว็บทั้งหมด</>
                                    )}
                                </button>
                            </div>
                        </div>

                        {/* Progress Bar */}
                        {isChecking && (
                            <div className="mt-6">
                                <div className="flex justify-between text-sm mb-1 text-gray-600 font-medium">
                                    <span>กำลังโหลดหน้าเว็บเพื่อตรวจสอบ...</span>
                                    <span>{progress}%</span>
                                </div>
                                <div className="w-full bg-gray-200 rounded-full h-2.5 overflow-hidden">
                                    <div className="bg-blue-600 h-2.5 rounded-full transition-all duration-300" style={{ width: `${progress}%` }}></div>
                                </div>
                            </div>
                        )}

                        {/* Stats Dashboard */}
                        <div className="grid grid-cols-3 gap-4 mt-6 pt-6 border-t border-gray-100">
                            <div className="bg-gray-50 p-4 rounded-lg border border-gray-100 text-center">
                                <div className="text-gray-500 text-sm font-medium">ระบบทั้งหมด</div>
                                <div className="text-2xl font-bold text-gray-800">{stats.total}</div>
                            </div>
                            <div className="bg-green-50 p-4 rounded-lg border border-green-100 text-center">
                                <div className="text-green-600 text-sm font-medium">เปิดได้ (โหลดสำเร็จ)</div>
                                <div className="text-2xl font-bold text-green-700">{stats.online}</div>
                            </div>
                            <div className="bg-red-50 p-4 rounded-lg border border-red-100 text-center">
                                <div className="text-red-600 text-sm font-medium">เปิดไม่ได้ (Error / ล่ม)</div>
                                <div className="text-2xl font-bold text-red-700">{stats.error}</div>
                            </div>
                        </div>
                    </div>

                    {/* Table Section */}
                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                        <div className="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                            <h2 className="font-semibold text-gray-700">รายการแอปพลิเคชัน ({filteredLinks.length})</h2>
                            <div className="relative">
                                <i className="fa-solid fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                                <input 
                                    type="text" 
                                    placeholder="ค้นหาระบบ..." 
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                    className="pl-9 pr-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 w-64"
                                />
                            </div>
                        </div>
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm">
                                <thead className="bg-gray-50 text-gray-600 uppercase text-xs border-b border-gray-200">
                                    <tr>
                                        <th className="px-6 py-4 font-medium">#</th>
                                        <th className="px-6 py-4 font-medium">ชื่อระบบ (Application)</th>
                                        <th className="px-6 py-4 font-medium">URL เป้าหมาย</th>
                                        <th className="px-6 py-4 font-medium text-center">สถานะการเปิดลิ้งก์</th>
                                        <th className="px-6 py-4 font-medium">ข้อสังเกตเพิ่มเติม</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-gray-100">
                                    {filteredLinks.map((link, idx) => (
                                        <tr key={link.id} className="hover:bg-gray-50 transition-colors">
                                            <td className="px-6 py-4 text-gray-400">{idx + 1}</td>
                                            <td className="px-6 py-4 font-medium text-gray-800">{link.name}</td>
                                            <td className="px-6 py-4">
                                                <a href={link.url} target="_blank" rel="noreferrer" className="text-blue-600 hover:underline truncate inline-block max-w-[200px] sm:max-w-xs" title={link.url}>
                                                    {link.url.replace('https://', '')}
                                                </a>
                                            </td>
                                            <td className="px-6 py-4 text-center">
                                                {link.status === 'idle' && <span className="text-gray-400">-</span>}
                                                {link.status === 'pending' && <span className="text-gray-400"><i className="fa-regular fa-clock"></i> รอคิว</span>}
                                                {link.status === 'checking' && <span className="text-blue-500 font-medium"><i className="fa-solid fa-circle-notch spinner"></i> กำลังตรวจสอบ</span>}
                                                {link.status === 'done' && link.data && (
                                                    <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium border ${link.data.badge}`}>
                                                        <i className={`fa-solid ${link.data.icon}`}></i>
                                                        {link.data.text}
                                                    </span>
                                                )}
                                            </td>
                                            <td className="px-6 py-4">
                                                {link.status === 'done' && link.data ? (
                                                    <div className="flex flex-col gap-1">
                                                        <span className="text-gray-600">{link.data.detail}</span>
                                                        <span className="text-xs text-gray-400"><i className="fa-regular fa-clock"></i> เวลาโหลด: {link.time} ms</span>
                                                    </div>
                                                ) : (
                                                    <span className="text-gray-400">-</span>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredLinks.length === 0 && (
                                        <tr>
                                            <td colSpan="5" className="px-6 py-8 text-center text-gray-500">
                                                ไม่พบระบบที่ค้นหา
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <div className="mt-4 text-xs text-gray-400 text-center pb-8">
                        หมายเหตุ: การตรวจสอบนี้ใช้เทคนิค No-CORS ยิงข้อมูลจำลองการเปิดเว็บจากเครื่องของคุณโดยตรง (ไม่ผ่าน Server กลาง) 
                        หากระบบแสดง Error แสดงว่าเครือข่ายของคุณไม่สามารถโหลดหน้านั้นได้ หรือโดเมนนั้นไม่มีอยู่จริง
                    </div>

                    {/* Report Modal */}
                    {showReport && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-2xl overflow-hidden flex flex-col">
                                <div className="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h3 className="font-bold text-gray-800 text-lg flex items-center gap-2">
                                        <i className="fa-solid fa-clipboard-list text-blue-600"></i>
                                        รูปแบบข้อความรายงาน
                                    </h3>
                                    <button onClick={() => setShowReport(false)} className="text-gray-400 hover:text-red-500 transition-colors">
                                        <i className="fa-solid fa-xmark text-xl"></i>
                                    </button>
                                </div>
                                <div className="p-6">
                                    <textarea
                                        id="report-text"
                                        readOnly
                                        className="w-full h-56 p-4 border border-gray-300 rounded-lg bg-gray-50 font-mono text-sm resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
                                        value={generateReportText()}
                                    ></textarea>
                                </div>
                                <div className="p-4 border-t border-gray-100 flex justify-end gap-3 bg-gray-50">
                                    <button
                                        onClick={handleCopy}
                                        className={`px-5 py-2 rounded-lg font-medium transition-colors flex items-center gap-2 ${
                                            copySuccess 
                                                ? 'bg-green-100 text-green-700 border border-green-200' 
                                                : 'bg-blue-100 text-blue-700 hover:bg-blue-200 border border-blue-200'
                                        }`}
                                    >
                                        <i className={`fa-solid ${copySuccess ? 'fa-check' : 'fa-copy'}`}></i>
                                        {copySuccess ? 'คัดลอกสำเร็จแล้ว!' : 'คัดลอกข้อความ'}
                                    </button>
                                    <button
                                        onClick={() => setShowReport(false)}
                                        className="px-5 py-2 bg-gray-200 text-gray-800 rounded-lg hover:bg-gray-300 transition-colors font-medium"
                                    >
                                        ปิดหน้าต่าง
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
